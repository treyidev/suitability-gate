spring.application.name=suitability-gate-core

# Virtual threads (Java 21) — cheap concurrency for the stateless evaluation core (brief D16/§13).
spring.threads.virtual.enabled=true

# Decision Record datastore — owned by the Decision Record module ONLY (locked decision D8). Default is
# file-backed H2 (D8's primary option): in-process, no container, and it PERSISTS across restarts to
# core/data/suitabilitygate.mv.db (gitignored). MODE=PostgreSQL lets the Postgres-flavoured Flyway
# migrations (CREATE SEQUENCE, `timestamp with time zone`, `text`, nextval()) run unchanged;
# DB_CLOSE_ON_EXIT=FALSE leaves the connection lifecycle to Spring, not the JVM shutdown hook.
#
# The datasource is fully env-selected, so the SAME build runs against Postgres by overriding these
# (the "postgres" compose profile — see docker-compose.yml / .env.example). Credentials come from env
# with dev defaults (env-only, never hardcoded secrets); H2's built-in dev account is sa / empty.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/suitabilitygate;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# Flyway owns the schema (db/migration/V*.sql). Hibernate only validates the entities against it —
# no auto-DDL. open-in-view off (no lazy loading in views).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Logging pattern & levels live in logback-spring.xml (console carries the [%X{evalId}] correlation
# id per evaluation). Logs are OPERATIONAL traceability only — the DecisionRecord ledger is the audit trail.

# Canonical ruleset file (locked decision D13 — thresholds live there, never in code). Dev default
# resolves relative to core/; docker-compose mounts the file and overrides via RULESET_PATH.
suitabilitygate.ruleset.path=${RULESET_PATH:../ruleset/ruleset-2026.07.1.yaml}

# Rules-engine selection — the engine sits behind SuitabilityEvaluator so it is swappable by config.
# `native` runs our SuitabilityRule beans; a future `dmn` engine (Kogito/OpenL) would register under
# that value with zero pipeline change (addendum A6/§4.5). Defaults to native when unset.
suitabilitygate.engine=native

# JWT signing — the secret is the real secret and comes from env (never hardcoded); the dev default is
# only for local runs and MUST be >= 32 bytes (HS256). Short-lived tokens, no refresh (prototype, §12).
suitabilitygate.security.jwt.secret=${JWT_SECRET:dev-only-suitabilitygate-hmac-signing-secret-change-me-0123456789}
suitabilitygate.security.jwt.ttl-minutes=${JWT_TTL_MINUTES:60}

# Explanation service (the ONE Java→Python call, D3) — consumed asynchronously by the explanation
# module strictly AFTER a decision is frozen; the verdict never waits on it. Env-overridable for
# docker-compose (service DNS name) vs local dev (localhost). Host port 11111 matches the
# docker-compose default (see docker-compose.yml) — off the crowded 8000/8080 range.
suitabilitygate.explanation.url=${EXPLANATION_URL:http://localhost:11111}

# CORS — the React frontend runs on its own browser origin (the Vite dev server on :5173), which is
# distinct from this gateway even under docker compose, so the browser blocks its calls unless the
# gateway allows that origin explicitly. Origin from env with a local-dev default. This is a Bearer-token
# API (no cookies), so credentials are NOT allowed — see SecurityConfig#corsConfigurationSource.
suitabilitygate.security.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173}
